<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 동물원 좌표 대탐험!</title>
    <style>
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0fdf4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
        }
        h1 {
            color: #166534;
            margin: 5px 0;
            font-size: 26px;
            text-align: center;
        }
        .description {
            color: #3f6212;
            font-size: 15px;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.5;
            font-weight: bold;
        }
        .game-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 480px;
            width: 100%;
        }
        
        .info-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            padding: 0 5px;
            box-sizing: border-box;
        }
        .progress {
            font-size: 16px;
            color: #64748b;
            font-weight: bold;
        }
        .score-box {
            font-size: 16px;
            color: #ea580c;
            font-weight: bold;
            background-color: #ffedd5;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #fed7aa;
        }

        .quiz-box {
            background-color: #fef08a;
            padding: 15px;
            border-radius: 12px;
            font-size: 19px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            border: 3px solid #ca8a04;
            line-height: 1.5;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .board-wrapper {
            display: grid;
            grid-template-columns: 45px repeat(7, 48px);
            grid-template-rows: repeat(7, 48px) 45px;
            gap: 4px;
            background-color: #cbd5e1;
            padding: 10px;
            border-radius: 12px;
        }

        .cell {
            background-color: white;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: background-color 0.2s;
            user-select: none;
            border: 1px solid #e2e8f0;
        }
        .cell:hover {
            background-color: #f1f5f9;
        }
        
        .cell.center-axis {
            background-color: #e0f2fe;
        }
        .cell.origin {
            background-color: #fef08a !important;
            border: 3px solid #eab308;
            box-sizing: border-box;
        }
        
        .label-y, .label-x {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 24px;
            user-select: none;
        }
        .label-blank {
            background-color: transparent;
        }

        .pos { color: #ea580c; } 
        .neg { 
            color: #1d4ed8; 
            text-shadow: 1px 1px 0px #dbeafe;
        } 
        .zero { color: #475569; font-size: 26px; }

        .message {
            font-size: 18px;
            font-weight: bold;
            height: 35px;
            margin-top: 15px;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.4;
        }
        .success { color: #16a34a; }
        .warning { color: #d97706; }
        .wrong { color: #dc2626; }
        
        .reset-btn {
            margin-top: 10px;
            padding: 12px 24px;
            background-color: #4bc0c0;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }
        .minus-text {
            font-weight: 900;
            font-size: 20px;
            color: #1d4ed8;
        }
    </style>
</head>
<body>

    <h1>📍 비밀 동물원 좌표 대탐험!</h1>
    <div class="description">
        가운데 <b>0</b>을 기준으로 움직요! 하늘색 길은 중심선이에요!<br>
        <span class="neg">왼쪽과 아래쪽은 빼기(<span class="minus-text">−</span>)</span> 방, <span class="pos">오른쪽과 위쪽은 더하기(+)</span> 방!
    </div>

    <div class="game-container">
        <div class="info-header">
            <div class="progress" id="progress">문제 1 / 15</div>
            <div class="score-box" id="score">점수: 0점 / 150점</div>
        </div>
        
        <div class="quiz-box" id="quiz">문제를 불러오는 중...</div>
        
        <div class="board-wrapper" id="board"></div>

        <div class="message" id="message"></div>
        <button class="reset-btn" id="resetBtn" onclick="resetGame()">처음부터 다시 하기</button>
    </div>

    <script>
        const items = [
            { icon: '🚩', x: 0, y: 0 },
            { icon: '🐻', x: 2, y: 3 }, { icon: '🦁', x: 3, y: 2 }, { icon: '🦊', x: 1, y: 1 },
            { icon: '🐰', x: -2, y: 3 }, { icon: '🐸', x: -1, y: 2 }, { icon: '🐷', x: -3, y: 1 },
            { icon: '🐨', x: -1, y: -1 }, { icon: '🐶', x: -3, y: -2 }, { icon: '🐱', x: -2, y: -3 },
            { icon: '🐸', x: 2, y: -1 }, { icon: '🦊', x: 3, y: -2 }, { icon: '🐰', x: 1, y: -3 }
        ];

        // 1~5번: 양수 문제 세트 (동물 힌트 포함)
        const positiveQuizzes = [
            { text: '오른쪽으로 1칸, 위로 1층! 좌표 (1, 1)에 있는 [여우🦊]를 찾아보세요!', x: 1, y: 1 },
            { text: '오른쪽으로 3칸, 위로 2층! 좌표 (3, 2)의 멋진 [사자🦁]는 어디 있을까요?', x: 3, y: 2 },
            { text: '오른쪽으로 2칸, 위로 끝인 3층! 좌표 (2, 3)의 커다란 [곰🐻]을 누르세요.', x: 2, y: 3 },
            { text: '오른쪽으로 1칸 가고 위아래론 안 가요! 좌표 (1, 0)에 혼자 있는 자리를 콕 찝어보세요.', x: 1, y: 0 },
            { text: '이번엔 옆으론 안 가고 위로만 2층! 좌표 (0, 2) 자리를 눌러볼까요?', x: 0, y: 2 }
        ];

        // 6~10번: 빼기 문제 세트 (동물 힌트 포함)
        const negativeQuizzes = [
            { text: '왼쪽 빼기 2칸(X=−2), 위로 끝인 3층! 좌표 (−2, 3)의 하얀 [토끼🐰]를 찾으세요!', x: -2, y: 3 },
            { text: '왼쪽 빼기 3칸(X=−3), 위로 1층! 좌표 (−3, 1)의 분홍색 [돼지🐷]를 눌러보세요.', x: -3, y: 1 },
            { text: '왼쪽 빼기 2칸(X=−2), 아래 빼기 3층(Y=−3)인 좌표 (−2, −3)의 [고양이🐱]는 어디 있죠?', x: -2, y: -3 },
            { text: '왼쪽 끝 빼기 3칸(X=−3), 아래 빼기 2층(Y=−2) 자리에 있는 [강아지🐶]를 찾으세요!', x: -3, y: -2 },
            { text: '왼쪽 빼기 1칸(X=−1), 아래 빼기 1층(Y=−1)에 숨은 귀여운 [코알라🐨]는?', x: -1, y: -1 }
        ];

        // 11~15번용 풀: 11번 문제부터는 시스템이 뒤의 동물명과 이모지를 자동으로 지우고 출제합니다.
        const randomPool = [
            { text: '가운데 기준점인 0번 자리! 좌표 (0, 0)에 꽂혀있는 [깃발🚩]을 클릭하세요!', x: 0, y: 0 },
            { text: '왼쪽 빼기 1칸(X=−1), 위로 2층! 좌표 (−1, 2)에 숨어있는 동물을 맞혀보세요.', x: -1, y: 2 },
            { text: '오른쪽으로 2칸, 아래 빼기 1층(Y=−1)인 좌표 (2, −1)에는 누가 살고 있을까요?', x: 2, y: -1 },
            { text: '오른쪽 끝인 3칸, 아래 빼기 2층(Y=−2) 자리에 있는 동물을 눌러보세요.', x: 3, y: -2 },
            { text: '오른쪽으로 1칸, 아래 빼기 3층(Y=−3)인 좌표 (1, −3)의 동물을 찾아주세요!', x: 1, y: -3 },
            { text: '옆으론 안 가고 아래 빼기 2층으로 슝! 좌표 (0, −2) 자리에 있는 동물을 맞춰보세요.', x: 0, y: -2 }
        ];

        let finalQuizzes = [];
        let currentQuizIndex = 0;
        let score = 0;
        let attemptCount = 0; // 문제당 클릭 횟수 추적 변수

        const boardElement = document.getElementById('board');
        const quizElement = document.getElementById('quiz');
        const messageElement = document.getElementById('message');
        const progressElement = document.getElementById('progress');
        const scoreElement = document.getElementById('score');
        const resetBtn = document.getElementById('resetBtn');

        function prepareQuizzes() {
            finalQuizzes = [...positiveQuizzes, ...negativeQuizzes];
            const shuffledPool = [...randomPool].sort(() => Math.random() - 0.5);
            for(let i=0; i<5; i++) {
                finalQuizzes.push(shuffledPool[i]);
            }
        }

        function renderBoard() {
            boardElement.innerHTML = '';

            for (let row = 3; row >= -3; row--) {
                const yLabel = document.createElement('div');
                yLabel.className = 'label-y';
                if (row > 0) { yLabel.classList.add('pos'); yLabel.innerText = row; }
                else if (row < 0) { yLabel.classList.add('neg'); yLabel.innerText = `−${Math.abs(row)}`; }
                else { yLabel.classList.add('zero'); yLabel.innerText = '0'; }
                boardElement.appendChild(yLabel);

                for (let col = -3; col <= 3; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (col === 0 || row === 0) cell.classList.add('center-axis');
                    if (col === 0 && row === 0) cell.classList.add('origin');
                    
                    const item = items.find(i => i.x === col && i.y === row);
                    if (item) cell.innerText = item.icon;

                    cell.onclick = () => checkAnswer(col, row);
                    boardElement.appendChild(cell);
                }
            }

            const blank = document.createElement('div');
            blank.className = 'label-blank';
            boardElement.appendChild(blank);

            for (let col = -3; col <= 3; col++) {
                const xLabel = document.createElement('div');
                xLabel.className = 'label-x';
                if (col > 0) { xLabel.classList.add('pos'); xLabel.innerText = col; }
                else if (col < 0) { xLabel.classList.add('neg'); xLabel.innerText = `−${Math.abs(col)}`; }
                else { xLabel.classList.add('zero'); xLabel.innerText = '0'; }
                boardElement.appendChild(xLabel);
            }
        }

        function checkAnswer(clickedX, clickedY) {
            if (currentQuizIndex >= finalQuizzes.length) return;

            const currentQuiz = finalQuizzes[currentQuizIndex];
            attemptCount++;

            if (clickedX === currentQuiz.x && clickedY === currentQuiz.y) {
                // 정답 맞춤
                score += 10;
                scoreElement.innerText = `점수: ${score}점 / 150점`;
                
                messageElement.className = 'message success';
                messageElement.innerText = '🎉 정답입니다! 아주 훌륭해요!';
                currentQuizIndex++;
                attemptCount = 0; // 다음 문제를 위해 초기화
                
                setTimeout(() => {
                    messageElement.innerText = '';
                    showQuiz();
                }, 1500);
            } else {
                // 오답일 때
                const displayX = clickedX < 0 ? `−${Math.abs(clickedX)}` : clickedX;
                const displayY = clickedY < 0 ? `−${Math.abs(clickedY)}` : clickedY;

                if (attemptCount === 1) {
                    // 1번째 틀렸을 때 기회 한 번 더 부여
                    messageElement.className = 'message warning';
                    messageElement.innerText = `🤔 거기는 (${displayX}, ${displayY}) 자리에요.\n다시 한번 잘 생각해보세요! 기회가 1번 더 있어요!`;
                } else {
                    // 2번째도 틀렸을 때 다음 문제로 강제 이동
                    messageElement.className = 'message wrong';
                    messageElement.innerText = `❌ 아쉽네요! 거기는 (${displayX}, ${displayY})였어요.\n다음 문제로 넘어갑니다!`;
                    currentQuizIndex++;
                    attemptCount = 0; // 초기화
                    
                    setTimeout(() => {
                        messageElement.innerText = '';
                        showQuiz();
                    }, 2000);
                }
            }
        }

        function showQuiz() {
            if (currentQuizIndex < finalQuizzes.length) {
                progressElement.innerText = `문제 ${currentQuizIndex + 1} / ${finalQuizzes.length}`;
                
                let quizText = finalQuizzes[currentQuizIndex].text;
                
                // [핵심] 11번 문제(인덱스 10)부터는 동물 힌트 문구를 지우기
                if (currentQuizIndex >= 10) {
                    quizBoxDesignChange(true); // 심화 문제 안내 시각 효과용
                } else {
                    quizBoxDesignChange(false);
                }
                
                quizElement.innerText = quizText;
                resetBtn.style.display = 'none';
            } else {
                progressElement.innerText = '탐험 완벽 성공!';
                quizElement.style.backgroundColor = '#bbf7d0';
                quizElement.style.borderColor = '#16a34a';
                quizElement.innerText = ` 축하합니다! 최종 점수 ${score}점으로 대탐험 임무를 끝냈습니다! 🏆`;
                messageElement.className = 'message success';
                messageElement.innerText = '스스로 좌표 규칙을 깨우친 멋진 어린이 대장님!';
                resetBtn.style.display = 'block';
            }
        }

        // 11번 이후 심화 문제 박스 색상 바꾸기 (아이들에게 긴장감과 집중도를 주는 요소)
        function quizBoxDesignChange(isAdvanced) {
            if (isAdvanced) {
                quizElement.style.backgroundColor = '#e0f2fe';
                quizElement.style.borderColor = '#0284c7';
                // 텍스트 상단에 심화 알림 추가
                if(!quizElement.dataset.advancedAlerted) {
                    messageElement.className = 'message warning';
                    messageElement.innerText = '🚀 11번부터는 동물 그림 힌트가 없는 심화 문제 단계입니다!';
                    setTimeout(() => { if(messageElement.className.includes('warning')) messageElement.innerText=''; }, 3000);
                    quizElement.dataset.advancedAlerted = 'true';
                }
            } else {
                quizElement.style.backgroundColor = '#fef08a';
                quizElement.style.borderColor = '#ca8a04';
            }
        }

        function resetGame() {
            currentQuizIndex = 0;
            score = 0;
            attemptCount = 0;
            delete quizElement.dataset.advancedAlerted;
            scoreElement.innerText = `점수: ${score}점 / 150점`;
            messageElement.innerText = '';
            prepareQuizzes();
            renderBoard();
            showQuiz();
        }

        prepareQuizzes();
        renderBoard();
        showQuiz();
    </script>
</body>
</html>
